# TLSNotary Verifier Server Configuration

# Absolute maximums accepted from the prover. The prover announces its
# requested max via the MPC protocol; the server rejects the session if the
# request exceeds these limits. Defaults: 1 MiB sent, 16 MiB recv.
# Env overrides: VERIFIER_MAX_SENT_DATA, VERIFIER_MAX_RECV_DATA.
max_sent_data: 1048576
max_recv_data: 16777216

# Webhook endpoints that receive verification results after a successful
# session. Keyed by TLS server name; "*" is a wildcard fallback.
webhooks:
  # Example: Twitter/X API webhook
  # "api.x.com":
  #   url: "https://your-backend.example.com/webhook/twitter"
  #   headers:
  #     Authorization: "Bearer your-secret-token"
  #     X-Source: "tlsn-verifier"

  # Example: GitHub API webhook
  # "api.github.com":
  #   url: "https://your-backend.example.com/webhook/github"

  # Wildcard: catch-all for any unmatched server_name
  # "*":
  #   url: "https://your-backend.example.com/webhook/default"
