version: '3.8'

services:
  verifier:
    build:
      context: ../verifier
      dockerfile: Dockerfile
    ports:
      - '7047:7047'
    volumes:
      - ./verifier-config.yaml:/app/config.yaml:ro
    environment:
      - RUST_LOG=info
      - GIT_HASH=${GIT_HASH:-dev}
    restart: unless-stopped

  eas-webhook:
    build:
      context: ../eas-webhook
      dockerfile: Dockerfile
    ports:
      - '3001:3001'
    environment:
      - PRIVATE_KEY=${PRIVATE_KEY}
      - EAS_SCHEMA_UID=${EAS_SCHEMA_UID}
      - VERIFIER_URL=${VERIFIER_URL:-https://demo.tlsnotary.org}
      - PORT=3001
    restart: unless-stopped

  demo-static:
    build:
      context: ../..
      dockerfile: packages/demo/Dockerfile
      args:
        VITE_VERIFIER_HOST: ${VITE_VERIFIER_HOST:-localhost:7047}
        VITE_SSL: ${VITE_SSL:-false}
        GIT_HASH: ${GIT_HASH:-dev}
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    ports:
      - '80:80'
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - verifier
      - demo-static
      - eas-webhook
    restart: unless-stopped
